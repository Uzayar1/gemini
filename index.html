<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gemini Chat</title>
<style>
body {
  font-family: Arial; background:#111; color:white; margin:0; padding:10px;
}
#chat {
  height:80vh; overflow:auto; display:flex; flex-direction:column;
  padding:10px; margin-bottom:10px; border:1px solid #444;
}
input{flex:1; padding:10px; border-radius:5px; border:none;}
button{
  padding:10px 15px; margin-left:5px; border-radius:5px; border:none;
  background:#1e88e5; color:white; cursor:pointer;
}
.bubble{
  padding:10px; border-radius:15px; margin:5px 0; max-width:80%; display:inline-block;
}
.user{background:#1e88e5; color:white; align-self:flex-end;}
.gemini{background:#444; color:white; align-self:flex-start;}
.typing{font-style:italic; color:#888;}
</style>
</head>
<body>

<h2 style="text-align:center;">Gemini AI Chat</h2>

<div id="chat"></div>

<div style="display:flex; margin:10px;">
<input id="userInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
const TYPING_SPEED = 50; // milliseconds per character

function appendBubble(text, className) {
    const chat = document.getElementById("chat");
    const bubble = document.createElement("div");
    bubble.className = "bubble " + className;
    chat.appendChild(bubble);
    return bubble;
}

function typeText(bubble, text) {
    return new Promise(resolve => {
        let i = 0;
        function typing() {
            if(i < text.length){
                bubble.innerHTML += text[i];
                i++;
                chatScroll();
                setTimeout(typing, TYPING_SPEED);
            } else resolve();
        }
        typing();
    });
}

function chatScroll(){
    const chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
    const chat = document.getElementById("chat");
    let input = document.getElementById("userInput").value;
    if(!input) return;

    appendBubble(input, "user");
    document.getElementById("userInput").value = '';

    const typingBubble = appendBubble("Typing...", "gemini typing");
    chatScroll();

    try {
        const response = await fetch("http://158.69.123.45:3000/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({message: input})
        });
        const data = await response.json();
        typingBubble.remove();

        const geminiBubble = appendBubble("", "gemini");
        await typeText(geminiBubble, data.reply);
    } catch(e){
        typingBubble.innerHTML = "Server error";
    }
}
</script>

</body>
</html>
