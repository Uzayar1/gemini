<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzayar1 AI Assistant</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1f1f1f; padding: 15px; text-align: center; color: #bb86fc; font-size: 1.2em; font-weight: bold; border-bottom: 1px solid #333; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; word-wrap: break-word; line-height: 1.4; }
        .user { background: #3700b3; align-self: flex-end; }
        .bot { background: #2c2c2c; align-self: flex-start; border: 1px solid #444; }
        .input-area { padding: 10px; background: #1f1f1f; display: flex; gap: 8px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #2c2c2c; color: white; outline: none; }
        button { background: #bb86fc; border: none; padding: 10px 18px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">Uzayar1 AI Assistant</div>
    <div id="chat-box">
        <div class="msg bot">မင်္ဂလာပါ သားကြီး! ငါ Uzayar1 AI ပါ။ ဘာကူညီပေးရမလဲ?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="စာရိုက်ပါ...">
        <button onclick="sendMsg()">Send</button>
    </div>

    <script>
        const API_KEY = "AIzaSyAtgNU1ddljTFxTxc8bVq84nVNyKvdHm2E";

        async function sendMsg() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="msg user">${userText}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });
                const data = await res.json();
                const botText = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="msg bot">${botText}</div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="msg bot" style="color:red">Error တက်သွားတယ် သားကြီး။</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
