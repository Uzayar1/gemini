<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzayar1 AI</title>
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { border: 2px solid #bb86fc; padding: 20px; margin: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Uzayar1 AI Assistant</h2>
        <p id="status">အဆင်သင့်ဖြစ်ပါပြီ သားကြီး!</p>
        <button onclick="test()">စမ်းသပ်ရန် နှိပ်ပါ</button>
    </div>

    <script>
        function test() {
            alert("မင်္ဂလာပါ! JavaScript အလုပ်လုပ်နေပါပြီ။");
            document.getElementById('status').innerHTML = "မင်းရဲ့ App အလုပ်လုပ်နေပြီ သားကြီးရာ!";
        }
    </script>
</body>
</html>
