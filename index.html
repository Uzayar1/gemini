<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzayar1 AI Assistant</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #1f1f1f; padding: 15px; text-align: center; color: #bb86fc; font-weight: bold; border-bottom: 1px solid #333; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.5; word-wrap: break-word; }
        .user { background-color: #3700b3; align-self: flex-end; color: white; }
        .bot { background-color: #2c2c2c; align-self: flex-start; border: 1px solid #444; }
        footer { padding: 10px; background-color: #1f1f1f; display: flex; gap: 8px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background-color: #2c2c2c; color: white; outline: none; }
        button { background-color: #bb86fc; border: none; padding: 10px 20px; border-radius: 25px; color: #121212; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>Uzayar1 AI Assistant</header>
    <div id="chat-container">
        <div class="message bot">မင်္ဂလာပါ သားကြီး! မင်းရဲ့ ကိုယ်ပိုင် AI အဆင်သင့်ဖြစ်ပါပြီ။ ဘာမေးချင်လဲ?</div>
    </div>
    <footer>
        <input type="text" id="userInput" placeholder="စာရိုက်ပါ...">
        <button onclick="sendMessage()">Send</button>
    </footer>

    <script>
        const API_KEY = "AIzaSyAtgNU1ddljTFxTxc8bVq84nVNyKvdHm2E"; 

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const chatContainer = document.getElementById('chat-container');
            const message = inputField.value.trim();
            if (!message) return;

            chatContainer.innerHTML += `<div class="message user">${message}</div>`;
            inputField.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: message }] }] })
                });

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;

                chatContainer.innerHTML += `<div class="message bot">${botReply}</div>`;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (error) {
                chatContainer.innerHTML += `<div class="message bot" style="color: #ff6b6b;">အမှားတစ်ခုရှိနေတယ် သားကြီး။ API Key သက်တမ်းကုန်နေတာလား စစ်ပေးပါ။</div>`;
            }
        }
    </script>
</body>
</html>
