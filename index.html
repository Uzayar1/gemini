<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gemini AI Chat</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
padding:20px;
}

#chat{
height:400px;
overflow:auto;
border:1px solid #444;
padding:10px;
margin-bottom:10px;
}

input{
width:75%;
padding:10px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<h2>Gemini AI Chat</h2>

<div id="chat"></div>

<input id="userInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>

<script>

const API_KEY = "AIzaSyAtgNU1ddljTFxTxc8bVq84nVNyKvdHm2E";

async function sendMessage(){

let input = document.getElementById("userInput").value;

document.getElementById("chat").innerHTML += "<p><b>You:</b> "+input+"</p>";

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:input}
]
}
]
})
}
);

const data = await response.json();

let reply = data.candidates[0].content.parts[0].text;

document.getElementById("chat").innerHTML += "<p><b>Gemini:</b> "+reply+"</p>";

}

</script>

</body>
</html>
